type Query {
  getAppSettings: GetAppSettings @checkAdminAccess @cacheControl(scope: PRIVATE) @auth(scope: PUBLIC)
  myAccount(apikey: String): MyAccount @checkAdminAccess @auth(scope: PUBLIC)
  getLists(apikey: String): GetLists @checkAdminAccess @auth(scope: PUBLIC)
  hostName: HostResponse @checkAdminAccess @auth(scope: PUBLIC)
  getEgoiFields: [EgoiFields] @checkAdminAccess @auth(scope: PUBLIC)
  getVtexClientFields(acronym: String): VtexClient @checkAdminAccess @auth(scope: PUBLIC)
  getDataEntities: [DataEntities] @checkAdminAccess @auth(scope: PUBLIC)
  getGoidiniMapFields: GoidiniMapResponse @checkAdminAccess @auth(scope: PUBLIC)
  getGoidiniOrderMapFields: [GoidiniOrderMap] @checkAdminAccess @auth(scope: PUBLIC)
  getGoidiniEgoiOrderStatus: [String!]! @checkAdminAccess @auth(scope: PUBLIC)
  goidiniSettings(apikey: String): GoidiniSettingsResponse @checkAdminAccess @auth(scope: PUBLIC)
}

type Mutation {
  saveAppSettings(input: AppSettings): Boolean
    @checkAdminAccess
    @cacheControl(scope: PRIVATE)
    @auth(scope: PUBLIC)
  createConnectedSites: GoidiniResponse @checkAdminAccess @auth(scope: PUBLIC)
  goidiniSync(input: GoidiniSync): GoidiniResponse @checkAdminAccess @auth(scope: PUBLIC)
  goidiniOrderMapSync(input: GoidiniOrderMapSync): GoidiniResponse @checkAdminAccess @auth(scope: PUBLIC)
  goidiniInstall(input: GoidiniInstall): GoidiniResponse @checkAdminAccess @auth(scope: PUBLIC)
  goidiniOrderSyncBulk(input: Boolean!): GoidiniResponse @checkAdminAccess @auth(scope: PUBLIC)
}

type HostResponse {
  hosts: [String!]!
}

input GoidiniInstall {
  apikey: String
  appkey: String
  apptoken: String
  domain: String
  listId: Int
}

input StatusPairInput {
  appStatus: String!
  egoiStatus: String!
}

input OrderMappingInput {
  order_type: String!
  mapping: [StatusPairInput!]!
}

input GoidiniOrderMapSync {
  payload: [OrderMappingInput!]!
}

input GoidiniSync {
  vtex: [String]
  egoi: [String]
  masterData: [MasterDataObject]
}

input MasterDataObject {
  entity: String
  vtexField: String
  egoiField: String
}

input AppSettings {
  appKey: String
  appToken: String
  apikey: String
  pixelActive: Boolean
  clientId: Int
  domain: String
  listId: Int
  connectedSites: Boolean
  vtex: [String]
  egoi: [String]
}
